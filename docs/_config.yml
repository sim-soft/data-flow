# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Heading anchor links
heading_anchors: true

# External navigation links
nav_external_links:
  - title: Packagist
    url: https://packagist.org/packages/simsoft/data-flow

# Exclude files
exclude:
  - img/
