title: Simsoft DataFlow
description: A lightweight, composable ETL pipeline library for PHP 8.2+
theme: just-the-docs

url: https://simsoft.github.io
baseurl: /data-flow

# Enable search
search_enabled: true
search.heading_level: 3

# Aux links (top-right)
aux_links:
  "GitHub":
    - "https://github.com/simsoft/data-flow"

aux_links_new_tab: true

# Footer
footer_content: "MIT License &copy; 2024-present V.Zang, Loo"

# Color scheme
